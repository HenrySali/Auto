<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#6C3FE0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Auto">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.svg">
  <link rel="apple-touch-icon" href="icon-192.svg">
  <title>Auto Manager</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Loading -->
  <div id="loading" class="loading-overlay" style="display:none">
    <div class="spinner"></div>
  </div>

  <!-- Login -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <h1 class="login-title">🚗 Auto Manager</h1>
      <p class="text-muted text-center">Gestion del auto de Mauro</p>
      <form onsubmit="handleLogin(event)" class="mt-4">
        <div class="form-group">
          <label>Tu nombre</label>
          <input type="text" id="login-nombre" class="input"
            placeholder="Ej: Carlos" required>
        </div>
        <div class="form-group">
          <label>Clave de acceso</label>
          <input type="password" id="login-clave" class="input"
            placeholder="Ingresa tu clave" required>
        </div>
        <button type="submit" class="btn btn-primary w-full">Entrar</button>
        <p id="login-error" class="msg msg-error" style="display:none"></p>
      </form>
    </div>
  </div>

  <!-- Token setup (solo propietario, primera vez) -->
  <div id="token-screen" style="display:none" class="login-screen">
    <div class="login-card">
      <h2 class="text-center font-bold">Configurar acceso</h2>
      <p class="text-muted text-sm mt-1">Solo se hace una vez. Pega tu token de GitHub para poder guardar datos.</p>
      <form onsubmit="handleToken(event)" class="mt-4">
        <div class="form-group">
          <label>Token de GitHub</label>
          <input type="password" id="setup-token" class="input" placeholder="github_pat_..." required>
        </div>
        <button type="submit" class="btn btn-primary w-full">Guardar y continuar</button>
        <p id="token-error" class="msg msg-error" style="display:none"></p>
      </form>
    </div>
  </div>

  <!-- App -->
  <div id="app-screen" class="app-screen" style="display:none">
    <header class="header">
      <div>
        <h1 class="header-title">Auto Manager</h1>
        <p class="header-sub"><span id="user-name"></span> -
          <span id="user-rol"></span></p>
      </div>
      <button onclick="App.logout()" class="btn-logout">Salir</button>
    </header>
    <main id="page-content" class="main-content"></main>
    <nav id="bottom-nav" class="bottom-nav"></nav>
  </div>

  <!-- Scripts -->
  <script src="js/github-api.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/km.js"></script>
  <script src="js/pages/entregas.js"></script>
  <script src="js/pages/fotos.js"></script>
  <script src="js/pages/gastos.js"></script>
  <script src="js/pages/vehiculo.js"></script>
  <script src="js/pages/notas.js"></script>
  <script src="js/pages/datos.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    function handleLogin(e) {
      e.preventDefault();
      const nombre = document.getElementById('login-nombre').value;
      const clave = document.getElementById('login-clave').value;
      const errEl = document.getElementById('login-error');
      errEl.style.display = 'none';
      const ok = App.login(nombre, clave);
      if (!ok) {
        errEl.textContent = 'Clave incorrecta.';
        errEl.style.display = 'block';
      }
    }

    function handleToken(e) {
      e.preventDefault();
      const token = document.getElementById('setup-token').value;
      if (!token.startsWith('github_pat_') && !token.startsWith('ghp_')) {
        document.getElementById('token-error').textContent = 'El token debe empezar con github_pat_ o ghp_';
        document.getElementById('token-error').style.display = 'block';
        return;
      }
      GitHubAPI.setToken(token);
      document.getElementById('token-screen').style.display = 'none';
      App.afterTokenSetup();
    }
  </script>
</body>
</html>
